<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasta Siliguri</title>

<style>
body{
  margin:0;
  font-family:system-ui,sans-serif;
  background:#f6f1e7;
}
.top{
  background:#ffd84d;
  padding:12px;
  font-weight:bold;
  text-align:center;
}
.card{
  background:#fff;
  margin:12px;
  padding:15px;
  border-radius:16px;
}
.header{
  display:flex;
  gap:12px;
  align-items:center;
}
.header img{
  width:60px;
  border-radius:12px;
}
input,textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}
.product{
  background:#fff;
  padding:12px;
  border-radius:16px;
}
.product img{
  width:100%;
  border-radius:12px;
}
.qty{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:8px 0;
}
.qty button{
  width:32px;height:32px;
  border-radius:50%;
}
.add{
  background:green;
  color:#fff;
  padding:10px;
  width:100%;
  border:none;
  border-radius:20px;
}
#cartBar{
  position:fixed;
  bottom:0;left:0;right:0;
  background:#111;
  color:#fff;
  display:none;
  justify-content:space-between;
  padding:12px;
}
#admin{
  display:none;
}
</style>
</head>

<body>

<div class="top">DELIVERY 10am–8pm • SAME DAY • FREE DELIVERY</div>

<div class="card header" id="logo">
  <img src="https://i.imgur.com/6XGQK9G.png">
  <div>
    <h2>SASTA SILIGURI</h2>
    <p>Same Day Free Delivery • COD</p>
  </div>
</div>

<div class="card">
  <h3>Your details</h3>
  <input id="name" placeholder="Full name">
  <input id="phone" placeholder="Phone number">
  <textarea id="address" placeholder="Full address"></textarea>
</div>

<div class="card" id="admin">
  <h3>Admin Panel</h3>
  <input id="pname" placeholder="Product name">
  <input id="pprice" placeholder="Price">
  <input id="pmrp" placeholder="MRP">
  <input type="file" id="pimg">
  <button onclick="addProduct()">Save Product</button>
</div>

<h3 style="padding-left:12px">Fruits</h3>
<div class="grid" id="list"></div>

<div id="cartBar">
  <span>🛒 <b id="count">0</b></span>
  <button onclick="order()">Order</button>
</div>

<script>
const ADMIN_PASS="1513";
const logo=document.getElementById("logo");
const admin=document.getElementById("admin");
const list=document.getElementById("list");
const cartBar=document.getElementById("cartBar");
const count=document.getElementById("count");

let tap=0,products=[],cart={};

logo.onclick=()=>{
 tap++;
 setTimeout(()=>tap=0,600);
 if(tap==3){
  const p=prompt("Admin password");
  if(p===ADMIN_PASS) admin.style.display="block";
 }
};

function addProduct(){
 const name=pname.value;
 const price=pprice.value;
 const mrp=pmrp.value;
 const file=pimg.files[0];
 const img=URL.createObjectURL(file);

 products.push({name,price,mrp,img});
 render();
}

function render(){
 list.innerHTML="";
 products.forEach((p,i)=>{
  list.innerHTML+=`
  <div class="product">
   <img src="${p.img}">
   <h4>${p.name}</h4>
   <del>₹${p.mrp}</del> <b>₹${p.price}</b>
   <div class="qty">
    <button onclick="add(${i},-1)">-</button>
    <span id="q${i}">1</span>
    <button onclick="add(${i},1)">+</button>
   </div>
   <button class="add" onclick="cartAdd(${i})">Add to cart</button>
  </div>`;
 });
}

function add(i,d){
 let q=document.getElementById("q"+i);
 let v=+q.innerText+d;
 if(v<1)v=1;
 q.innerText=v;
}

function cartAdd(i){
 let q=+document.getElementById("q"+i).innerText;
 cart[i]=(cart[i]||0)+q;
 count.innerText=Object.values(cart).reduce((a,b)=>a+b,0);
 cartBar.style.display="flex";
}

function order(){
 alert("Next step WhatsApp order");
}
</script>

</body>
</html>
