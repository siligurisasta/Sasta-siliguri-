<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sasta Siliguri</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top">
  DELIVERY 10am–8pm • SAME DAY • FREE DELIVERY
</div>

<div class="card header" id="logo">
  <img src="logo.png" alt="logo">
  <div>
    <h2>SASTA SILIGURI</h2>
    <p>Same Day Free Delivery • COD</p>
  </div>
</div>

<div class="card">
  <h3>Your details</h3>
  <input id="name" placeholder="Full name">
  <input id="phone" placeholder="Phone number">
  <textarea id="address" placeholder="Full address"></textarea>
</div>

<div class="card admin" id="admin">
  <h3>Admin Panel</h3>
  <input type="hidden" id="editIndex">
  <input id="pname" placeholder="Product name">
  <input id="pprice" placeholder="Offer price">
  <input id="pmrp" placeholder="MRP">
  <input type="file" id="pimg">
  <button onclick="addProduct()">Save Product</button>
</div>

<h3 class="section">Fruits</h3>
<div class="grid" id="productList"></div>

<div class="cart-bar" id="cartBar">
  🛒 Items: <b id="cartCount">0</b>
  <button onclick="orderNow()">Order</button>
</div>

<script src="script.js" defer></script>
</body>
</html>
