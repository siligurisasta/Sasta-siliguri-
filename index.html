<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasta Siliguri</title>
<link rel="stylesheet" href="style.css">

<style>
/* 👇 logo ko force clickable */
#logo{
  cursor:pointer;
  user-select:none;
}
#logo img{
  pointer-events:none;
}
</style>
</head>
<body>

<div class="top">
  DELIVERY 10am–8pm • SAME DAY • FREE DELIVERY
</div>

<div class="card header" id="logo">
  <img src="logo.png" alt="logo">
  <div>
    <h2>SASTA SILIGURI</h2>
    <p>Same Day Free Delivery • COD</p>
  </div>
</div>

<div class="card">
  <h3>Your details</h3>
  <input placeholder="Full name">
  <input placeholder="Phone number">
  <textarea placeholder="Full address"></textarea>
</div>

<div class="card admin" id="admin" style="display:none">
  <h2>Admin Panel (Owner Only)</h2>

  <input id="pname" placeholder="Product name">
  <input id="pprice" placeholder="Price ₹">
  <input id="pmrp" placeholder="MRP ₹">
  <input id="pmin" placeholder="Minimum order quantity">
  <input id="punit" placeholder="Unit">
  <input id="pimgurl" placeholder="Image URL">

  <button>Add Product</button>
</div>

<h3 class="section">Fruits</h3>
<div class="grid"></div>

<div class="cart-bar" style="display:none">
  🛒 Items: <b>0</b>
  <button>Order</button>
</div>

<script>
const ADMIN_PASS = "1513";

document.addEventListener("DOMContentLoaded", () => {

  const logo = document.getElementById("logo");
  const admin = document.getElementById("admin");

  let tap = 0;
  let timer = null;

  function handleTap(){
    tap++;
    clearTimeout(timer);
    timer = setTimeout(()=>tap=0,800);

    if(tap === 3){
      tap = 0;
      const p = prompt("Admin password");
      if(p === ADMIN_PASS){
        admin.style.display = "block";
        admin.scrollIntoView({behavior:"smooth"});
        alert("Admin panel unlocked");
      }else{
        alert("Wrong password");
      }
    }
  }

  // 👇 mobile + desktop dono
  logo.addEventListener("click", handleTap);
  logo.addEventListener("touchstart", handleTap);

});
</script>

</body>
</html>
