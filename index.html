<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel – Sasta Siliguri</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Admin Panel (Owner Only)</h1>

  <input id="pname" placeholder="Product name">
  <input id="pprice" placeholder="Price ₹" type="number">
  <input id="pmrp" placeholder="MRP ₹" type="number">
  <input id="pmin" placeholder="Minimum order quantity" type="number">
  <input id="punit" placeholder="Unit (kg, pcs, box, gram etc)">
  <input id="pimg" placeholder="Image URL (optional)">

  <label class="check">
    <input type="checkbox" id="pstock" checked>
    In stock
  </label>

  <div class="btns">
    <button onclick="saveProduct()">Save / Update</button>
    <button onclick="addProduct()">Add new product</button>
    <button onclick="deleteProduct()">Delete product</button>
  </div>

  <hr>

  <h2>Products</h2>
  <div id="list"></div>

</div>

<script src="script.js"></script>
</body>
</html>
