<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasta Siliguri</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div id="logo" class="header">
  <h1>SASTA SILIGURI</h1>
  <p>Same Day Free Delivery • COD</p>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="admin">
  <h2>Admin Panel (Owner Only)</h2>

  <input id="pname" placeholder="Product name">
  <input id="price" placeholder="Price ₹" type="number">
  <input id="mrp" placeholder="MRP ₹" type="number">
  <input id="min" placeholder="Minimum order quantity" type="number">
  <input id="unit" placeholder="Unit (kg, pcs, box etc)">
  <input id="img" placeholder="Image URL (optional)">

  <div class="row">
    <label>
      <input type="checkbox" id="stock" checked>
      In stock
    </label>
  </div>

  <div class="row">
    <button onclick="addProduct()">Add new product</button>
    <button onclick="updateProduct()">Save / Update</button>
    <button onclick="deleteProduct()">Delete product</button>
  </div>
</div>

<!-- PRODUCT LIST -->
<div id="list" class="list"></div>

<script src="script.js"></script>
</body>
</html>
