<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sasta Siliguri</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top">
  DELIVERY 10am–8pm • SAME DAY • FREE DELIVERY
</div>

<div class="card header" id="logo">
  <img src="logo.png" alt="logo">
  <div>
    <h2>SASTA SILIGURI</h2>
    <p>Same Day Free Delivery • COD</p>
  </div>
</div>

<div class="card">
  <h3>Your details</h3>
  <input id="name" placeholder="Full name">
  <input id="phone" placeholder="Phone number">
  <textarea id="address" placeholder="Full address"></textarea>
</div>

<div class="card admin" id="admin" style="display:none">
  <h2>Admin Panel (Owner Only)</h2>

  <input id="pname" placeholder="Product name">
  <input id="pprice" placeholder="Price ₹" type="number">
  <input id="pmrp" placeholder="MRP ₹" type="number">
  <input id="pmin" placeholder="Minimum order quantity" type="number">
  <input id="punit" placeholder="Unit (kg, pcs, box, gram etc)">
  <input id="pimgurl" placeholder="Image URL (optional)">

  <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
    <input type="file" id="pimg">
    <label>
      <input type="checkbox" id="pstock" checked> In stock
    </label>
  </div>

  <div style="display:flex;gap:10px;margin-top:12px">
    <button onclick="saveUpdate()">Save / Update</button>
    <button onclick="addNew()">Add new product</button>
    <button onclick="deleteCurrent()">Delete product</button>
  </div>
</div>

<h3 class="section">Fruits</h3>
<div class="grid" id="productList"></div>

<div class="cart-bar" id="cartBar">
  🛒 Items: <b id="cartCount">0</b>
  <button onclick="orderNow()">Order</button>
</div>

<script src="script.js" defer></script>
</body>
</html>
