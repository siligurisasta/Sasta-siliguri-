<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasta Siliguri</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top">
  DELIVERY 10am–8pm • SAME DAY • FREE DELIVERY
</div>

<!-- LOGO / HEADER -->
<div id="logo" class="header">
  <h1>SASTA SILIGURI</h1>
  <p>Same Day Free Delivery • COD</p>
</div>

<!-- ADMIN PANEL -->
<div id="admin" class="admin">
  <h2>Admin Panel (Owner Only)</h2>

  <input id="pname" placeholder="Product name">
  <input id="price" type="number" placeholder="Price ₹">
  <input id="mrp" type="number" placeholder="MRP ₹">
  <input id="min" type="number" placeholder="Minimum order quantity">
  <input id="unit" placeholder="Unit (kg, pcs, box, gram etc)">
  <input id="img" placeholder="Image URL (optional)">

  <div class="row">
    <input type="checkbox" id="stock" checked>
    <label for="stock">In stock</label>
  </div>

  <div class="row buttons">
    <button type="button" onclick="addProduct()">Add new product</button>
    <button type="button" onclick="updateProduct()">Save / Update</button>
    <button type="button" onclick="deleteProduct()">Delete product</button>
  </div>
</div>

<h3 class="section">Products</h3>
<div id="productList" class="grid"></div>

<script src="script.js"></script>
</body>
</html>
